<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Rendimiento Técnico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow-x: auto; }
        
        /* Pantalla de login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; color: white; }
        #login-screen input { padding: 10px; margin: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center;}
        #login-screen button { padding: 10px 20px; cursor: pointer; background: #18bc9c; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 16px;}
        
        /* Botones de navegación (Pestañas) */
        .botones-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 15px; background-color: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 5px; cursor: pointer; font-weight: bold; color: #2c3e50; transition: 0.3s; }
        .tab-btn:hover { background-color: #bdc3c7; }
        .tab-btn.activo { background-color: #3498db; color: white; border-color: #2980b9; }

        /* Diseño de la Tabla */
        table { width: 100%; border-collapse: collapse; font-size: 14px; white-space: nowrap; }
        th, td { padding: 10px 15px; text-align: left; border-bottom: 1px solid #dddddd; }
        th { background-color: #2c3e50; color: white; font-weight: bold; }
        tbody tr:nth-of-type(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f1f1; }
        
        .titulo-tabla { margin-top: 0; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Acceso Restringido</h2>
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="checkPassword()">Ingresar</button>
    </div>

    <div class="container" id="dashboard" style="display:none;">
        
        <div class="botones-container" id="menu-botones" style="display: none;">
            <button class="tab-btn" id="btn-consolidado2026" onclick="mostrarTabla('consolidado2026', 'Consolidado del Año 2026')">Consolidado 2026</button>
            <button class="tab-btn" id="btn-general2026" onclick="mostrarTabla('general2026', 'General del Año 2026')">General 2026</button>
            <button class="tab-btn" id="btn-consolidado2025" onclick="mostrarTabla('consolidado2025', 'Consolidado del Año 2025')">Consolidado 2025</button>
            <button class="tab-btn" id="btn-general2025" onclick="mostrarTabla('general2025', 'General del Año 2025')">General 2025</button>
        </div>

        <h2 class="titulo-tabla" id="titulo-actual">Cargando datos...</h2>
        
        <table id="miTabla">
            <thead id="tabla-cabecera"></thead>
            <tbody id="tabla-cuerpo"></tbody>
        </table>
    </div>

    <script>
        // --- 1. SEGURIDAD ---
        function checkPassword() {
            const pass = document.getElementById('password').value;
            if (pass === '123456') { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                cargarDatos();
            } else {
                alert('Contraseña incorrecta');
            }
        }

        // --- 2. CONEXIÓN CON APPS SCRIPT ---
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5M2vPZLqENz5W4KbKNhJWrKvWG3EgkBqUw02Xgz-IDpRNiTBWifeeXwBGyhNNvfbRNA/exec';
        
        // Variable global para guardar todas las tablas que lleguen desde Sheets
        let datosGlobales = {};

        async function cargarDatos() {
            try {
                const respuesta = await fetch(APPS_SCRIPT_URL);
                datosGlobales = await respuesta.json();
                
                // Mostrar los botones una vez que los datos se descargaron
                document.getElementById('menu-botones').style.display = 'flex';
                
                // Mostrar por defecto la primera tabla (Consolidado 2026)
                mostrarTabla('consolidado2026', 'Consolidado del Año 2026');

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('titulo-actual').innerText = "Hubo un error al cargar los datos.";
            }
        }

        // --- 3. LÓGICA DE BOTONES Y RENDERIZADO DE TABLA ---
        function mostrarTabla(idTabla, titulo) {
            // Actualizar título
            document.getElementById('titulo-actual').innerText = titulo;

            // Cambiar color del botón activo
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('activo'));
            document.getElementById('btn-' + idTabla).classList.add('activo');

            const cabecera = document.getElementById('tabla-cabecera');
            const cuerpo = document.getElementById('tabla-cuerpo');
            cabecera.innerHTML = '';
            cuerpo.innerHTML = '';

            const matrizDatos = datosGlobales[idTabla];

            if (!matrizDatos || matrizDatos.length === 0) {
                cuerpo.innerHTML = '<tr><td>No hay datos en este rango.</td></tr>';
                return;
            }

            // En este formato 2D, asumiremos que la fila 0 (la primera del rango) son los encabezados
            const encabezados = matrizDatos[0];
            const trCabecera = document.createElement('tr');
            
            encabezados.forEach(textoColumna => {
                const th = document.createElement('th');
                th.textContent = textoColumna;
                trCabecera.appendChild(th);
            });
            cabecera.appendChild(trCabecera);

            // Las filas restantes son los datos
            for (let i = 1; i < matrizDatos.length; i++) {
                const fila = matrizDatos[i];
                // Evitamos imprimir filas que estén completamente en blanco
                const filaTieneDatos = fila.some(celda => celda !== ""); 
                
                if (filaTieneDatos) {
                    const tr = document.createElement('tr');
                    fila.forEach(celda => {
                        const td = document.createElement('td');
                        td.textContent = celda;
                        tr.appendChild(td);
                    });
                    cuerpo.appendChild(tr);
                }
            }
        }
    </script>
</body>
</html>
