<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Municipalidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS GENERALES --- */
        body { font-family: 'Roboto Condensed', sans-serif; font-size: 12px; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333;}
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .responsive-table { overflow-x: auto; margin-top: 15px; }
        .logo { max-width: 150px; height: auto; margin-bottom: 20px; }
        .encabezado-dashboard .logo { margin-bottom: 10px; max-width: 120px;}

        /* --- PANTALLA DE LOGIN --- */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; color: white; }
        #login-screen input { font-family: 'Roboto Condensed', sans-serif; padding: 12px; margin: 15px; border-radius: 5px; border: none; font-size: 14px; text-align: center; width: 200px;}
        #login-screen button { font-family: 'Roboto Condensed', sans-serif; padding: 10px 25px; cursor: pointer; background: #18bc9c; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase;}

        /* --- ENCABEZADO Y FECHA --- */
        .encabezado-dashboard { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .titulo-area { display: flex; align-items: center; gap: 15px; }
        .fecha-emision { font-weight: bold; color: #7f8c8d; font-size: 14px; }

        /* --- BOTONES Y SECCIONES --- */
        .seccion-botones { margin-bottom: 20px; padding: 10px; background-color: #f8f9fa; border-radius: 5px; border-left: 4px solid #3498db;}
        .seccion-botones h3 { margin-top: 0; margin-bottom: 10px; font-size: 15px; color: #2c3e50; text-transform: uppercase;}
        .botones-container { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .tab-btn { font-family: 'Roboto Condensed', sans-serif; padding: 8px 12px; background-color: white; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-weight: bold; color: #555; transition: 0.2s; font-size: 13px;}
        .tab-btn:hover { background-color: #e2e2e2; }
        .tab-btn.activo { background-color: #2c3e50; color: white; border-color: #2c3e50; }

        /* --- BOTÓN GRÁFICA --- */
        #btn-ver-grafica {
            display: none; background-color: #e67e22; color: white; border: none; 
            padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;
            font-family: 'Roboto Condensed', sans-serif; margin-left: 15px; text-transform: uppercase;
        }

        /* --- DISEÑO DE TABLA --- */
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 10px 10px; text-align: center; border-bottom: 1px solid #e1e1e1; font-size: 14px; }
        th:first-child, td:first-child { text-align: left; }
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: bold; text-transform: uppercase;}
        tbody tr:nth-of-type(even) { background-color: #fbfbfb; }
        tbody tr:hover { background-color: #f5f5f5; }
        .titulo-tabla { margin: 0; color: #2c3e50; font-size: 18px; display: inline-block;}
        .fila-totales { font-weight: bold !important; background-color: #eef2f5 !important; }

        /* --- MODO VERTICAL --- */
        table.modo-general th {
            writing-mode: vertical-rl; transform: rotate(180deg); text-align: center;
            height: 160px; padding: 5px; vertical-align: bottom; max-width: 25px;
            border-left: 1px solid #e1e1e1; border-right: 1px solid #e1e1e1; font-size: 12px;
        }
        table.modo-general td { text-align: center; font-size: 15px;}
        table.modo-general th:first-child, table.modo-general td:first-child {
            writing-mode: horizontal-tb; transform: none; height: auto; text-align: left;
            max-width: none; min-width: 160px; vertical-align: middle; position: sticky; left: 0;
            background-color: white; z-index: 1;
        }

        /* --- VENTANA MODAL (POPUP) --- */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px;
            position: relative; text-align: center;
        }
        .close-modal {
            position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #666;
        }
        #chart-container { width: 100%; height: 400px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="Logo_Municipalidad.png" alt="Logo Municipalidad" class="logo">
        <h2>Acceso Restringido</h2>
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="checkPassword()">Ingresar</button>
    </div>

    <div class="container" id="dashboard" style="display:none;">
        
        <div class="encabezado-dashboard">
            <div class="titulo-area">
                <img src="Logo_Municipalidad.png" alt="Logo Municipalidad" class="logo">
                <h1 style="margin: 0; font-size: 22px;">Control de Expedientes y Rendimiento</h1>
            </div>
            <div class="fecha-emision">
                Fecha: <span id="fecha-actual"></span>
            </div>
        </div>

        <div id="menu-principal" style="display: none;">
            <div class="seccion-botones">
                <h3>📊 Cantidad de Expedientes</h3>
                <div class="botones-container">
                    <button class="tab-btn" id="btn-consolidado2026" onclick="mostrarTabla('consolidado2026', 'Consolidado - Año 2026', false, true)">Consolidado 2026</button>
                    <button class="tab-btn" id="btn-consolidado2025" onclick="mostrarTabla('consolidado2025', 'Consolidado - Año 2025', false, true)">Consolidado 2025</button>
                    <button class="tab-btn" id="btn-general2026" onclick="mostrarTabla('general2026', 'Detalle - Año 2026', true, false)">Detalle 2026</button>
                    <button class="tab-btn" id="btn-general2025" onclick="mostrarTabla('general2025', 'Detalle - Año 2025', true, false)">Detalle 2025</button>
                </div>
            </div>

            <div class="seccion-botones" style="border-left-color: #e67e22;">
                <h3>📂 Ubicación de Expedientes (Pestaña Estado)</h3>
                <div class="botones-container">
                    <button class="tab-btn" id="btn-estadoConsolidado2026" onclick="mostrarTabla('estadoConsolidado2026', 'Ubicación de Expedientes (Consolidado) - 2026', false, true)">Ubicación 2026</button>
                    <button class="tab-btn" id="btn-estadoConsolidado2025" onclick="mostrarTabla('estadoConsolidado2025', 'Ubicación de Expedientes (Consolidado) - 2025', false, true)">Ubicación 2025</button>
                    <button class="tab-btn" id="btn-estadoGeneral2026" onclick="mostrarTabla('estadoGeneral2026', 'Detalle de Ubicación por Inspector - 2026', true, false)">Detalle 2026</button>
                    <button class="tab-btn" id="btn-estadoGeneral2025" onclick="mostrarTabla('estadoGeneral2025', 'Detalle de Ubicación por Inspector - 2025', true, false)">Detalle 2025</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; align-items: center;">
            <h2 class="titulo-tabla" id="titulo-actual">Sincronizando...</h2>
            <button id="btn-ver-grafica" onclick="abrirModalGrafica()">Ver Gráfica de Pastel</button>
        </div>
        
        <div class="responsive-table">
            <table id="miTabla">
                <thead id="tabla-cabecera"></thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-grafica" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <h3 id="titulo-modal">Porcentajes de Distribución</h3>
            <div id="chart-container">
                <canvas id="canvasGrafica"></canvas>
            </div>
        </div>
    </div>

    <script>
        let datosGlobales = {};
        let tablaActiva = "";
        let miGrafica = null;

        function checkPassword() {
            if (document.getElementById('password').value === '123456') { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString('es-ES', opciones);
                cargarDatos();
            } else { alert('Contraseña incorrecta'); }
        }

        async function cargarDatos() {
            try {
                const respuesta = await fetch('https://script.google.com/macros/s/AKfycbx5M2vPZLqENz5W4KbKNhJWrKvWG3EgkBqUw02Xgz-IDpRNiTBWifeeXwBGyhNNvfbRNA/exec');
                datosGlobales = await respuesta.json();
                document.getElementById('menu-principal').style.display = 'block';
                mostrarTabla('consolidado2026', 'Consolidado - Año 2026', false, true);
            } catch (e) { document.getElementById('titulo-actual').innerText = "Error de conexión."; }
        }

        function mostrarTabla(idTabla, titulo, esGeneral, permitirGrafica) {
            tablaActiva = idTabla;
            document.getElementById('titulo-actual').innerText = titulo;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('activo'));
            document.getElementById('btn-' + idTabla).classList.add('activo');

            // Mostrar u ocultar botón de gráfica
            document.getElementById('btn-ver-grafica').style.display = permitirGrafica ? 'inline-block' : 'none';

            const tablaEl = document.getElementById('miTabla');
            const cabecera = document.getElementById('tabla-cabecera');
            const cuerpo = document.getElementById('tabla-cuerpo');
            
            cabecera.innerHTML = ''; cuerpo.innerHTML = '';
            esGeneral ? tablaEl.classList.add('modo-general') : tablaEl.classList.remove('modo-general');

            const matrizDatos = datosGlobales[idTabla];
            if (!matrizDatos) return;

            const encabezados = matrizDatos[0];
            const trCabecera = document.createElement('tr');
            encabezados.forEach(h => { const th = document.createElement('th'); th.textContent = h; trCabecera.appendChild(th); });
            cabecera.appendChild(trCabecera);

            for (let i = 1; i < matrizDatos.length; i++) {
                const fila = matrizDatos[i];
                if (fila.some(c => c !== "" && c !== null)) {
                    const tr = document.createElement('tr');
                    const esFilaTotal = fila.some(c => String(c).trim().toUpperCase() === 'TOTAL');
                    if (esFilaTotal) tr.classList.add('fila-totales');

                    fila.forEach((celda, idx) => {
                        const td = document.createElement('td');
                        td.textContent = celda || '';
                        if (encabezados[idx] && String(encabezados[idx]).toUpperCase() === 'TOTAL') td.style.fontWeight = 'bold';
                        tr.appendChild(td);
                    });
                    cuerpo.appendChild(tr);
                }
            }
        }

        // --- LÓGICA DE GRÁFICA ---
        function abrirModalGrafica() {
            document.getElementById('modal-grafica').style.display = 'flex';
            document.getElementById('titulo-modal').innerText = "Porcentajes: " + document.getElementById('titulo-actual').innerText;
            
            const matriz = datosGlobales[tablaActiva];
            
            let etiquetas = [];
            let valores = [];

            // Leer la tabla de forma VERTICAL (Categorías en columna 0, números en las siguientes)
            for (let i = 0; i < matriz.length; i++) {
                let fila = matriz[i];
                
                // Validar que la fila exista y tenga datos
                if (!fila || fila.length === 0) continue;

                let label = String(fila[0] || '').trim();
                let labelUpper = label.toUpperCase();

                // EXCLUIR explícitamente la fila de "TOTAL", años (2025/2026), o títulos
                if (!label || labelUpper.includes('TOTAL') || labelUpper === '2026' || labelUpper === '2025' || labelUpper.includes('UBICACION')) {
                    continue; // Se salta esta fila y pasa a la siguiente
                }

                // Buscar el primer valor numérico válido en las otras columnas de esa fila
                let valor = 0;
                for (let j = 1; j < fila.length; j++) {
                    // Limpiar el texto por si tiene comas (ej. 1,000)
                    let cellData = String(fila[j]).trim().replace(/,/g, ''); 
                    let celdaNum = parseFloat(cellData);
                    
                    if (!isNaN(celdaNum) && cellData !== '') {
                        valor = celdaNum;
                        break; // Encontramos el número, dejamos de buscar en esta fila
                    }
                }

                // Si encontró un valor mayor a 0, lo agrega a la rebanada del pastel
                if (valor > 0) {
                    etiquetas.push(label);
                    valores.push(valor);
                }
            }

            const ctx = document.getElementById('canvasGrafica').getContext('2d');
            if (miGrafica) miGrafica.destroy();

            miGrafica = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        data: valores,
                        backgroundColor: ['#3498db', '#e67e22', '#2ecc71', '#e74c3c', '#9b59b6', '#f1c40f', '#1abc9c', '#34495e', '#7f8c8d']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Roboto Condensed', size: 12 } } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    let value = context.parsed;
                                    let sum = context.dataset.data.reduce((a, b) => a + b, 0);
                                    let percentage = ((value * 100) / sum).toFixed(1) + "%";
                                    return label + ": " + value + " expedientes (" + percentage + ")";
                                }
                            }
                        }
                    }
                }
            });
        }

        function cerrarModal() { document.getElementById('modal-grafica').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('modal-grafica')) cerrarModal(); }
    </script>
</body>
</html>
